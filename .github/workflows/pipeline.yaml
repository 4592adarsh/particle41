name: Build and Update Deployment

on:
  push:
    branches: [ "main" ]
    paths: [ "app/**" ]

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "4592adarsh"
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          platforms: linux/amd64
          tags: 4592adarsh/particle41:${{ github.run_id }}

      - name: Update Kubernetes deployment file
        run: |
          # Updates the image line to 4592adarsh/particle41:<run_id>
          sed -i "s|image: .*|image: 4592adarsh/particle41:${{ github.run_id }}|g" app/deployment.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/deployment.yaml
          git commit -m "chore: update image tag to ${{ github.run_id }}"
          git push