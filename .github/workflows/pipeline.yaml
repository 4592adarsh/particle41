name: Build and Update Deployment

on:
  push:
    branches: [ "main" ]
    # paths: [ "app/**" ]

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "4592adarsh"
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          platforms: linux/arm/v7,linux/arm64,linux/amd64
          provenance: false
          tags: 4592adarsh/particle41:${{ github.run_id }}

      - name: Update Kubernetes deployment file
        run: |
          # Updates the image line to 4592adarsh/particle41:<run_id>
          sed -i "s|image: .*|image: 4592adarsh/particle41:${{ github.run_id }}|g" app/microservice.yml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git add -f app/microservice.yml
          git commit -m "chore: update image tag to ${{ github.run_id }}"
          git pull --rebase origin "${{ github.ref_name }}"
          git push